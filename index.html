<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎤 Shahan's Sing Shack</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@400;600;700;800;900&display=swap');
:root{--bg:#0a0a12;--bg2:#12121e;--sf:#1a1a2e;--sf2:#22223a;--bd:#2a2a4a;--tx:#eee8ff;--tx2:#9990b0;--pink:#ff2d95;--blue:#00d4ff;--purp:#b44aff;--green:#39ff14;--yel:#ffe53b;--orange:#ff6b2b;--gold:#ffd700}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(255,45,149,.05) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(0,212,255,.05) 0%,transparent 60%),radial-gradient(ellipse at 50% 80%,rgba(180,74,255,.04) 0%,transparent 60%);pointer-events:none;z-index:0}

.hdr{text-align:center;padding:14px 20px 10px;border-bottom:1px solid var(--bd);background:linear-gradient(180deg,#14142a,var(--bg));position:relative;z-index:1}
.hdr h1{font-family:'Righteous',cursive;font-size:26px;background:linear-gradient(135deg,var(--pink),var(--blue),var(--purp));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.hdr p{color:var(--tx2);font-size:11px;margin-top:1px;font-weight:600}

.tabs{display:flex;justify-content:center;gap:3px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.tbtn{padding:6px 14px;border:1px solid transparent;border-radius:16px;background:0;color:var(--tx2);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.2s}
.tbtn:hover{color:var(--tx);background:var(--sf)}
.tbtn.on{background:var(--sf2);color:var(--blue);border-color:var(--blue);box-shadow:0 0 12px rgba(0,212,255,.25)}

.main{position:relative;z-index:1}
.tab{display:none;padding:12px 14px;max-width:960px;margin:0 auto}
.tab.on{display:block}

/* NOW PLAYING */
.np{background:linear-gradient(135deg,#1a1040,#2a1040,#1a2040);border:1px solid var(--pink);border-radius:14px;padding:18px;text-align:center;position:relative;overflow:hidden;box-shadow:0 0 20px rgba(255,45,149,.25);margin-bottom:12px}
.np::before{content:'';position:absolute;inset:-2px;border-radius:14px;background:linear-gradient(135deg,var(--pink),var(--blue),var(--purp),var(--pink));background-size:400% 400%;animation:glow 6s ease-in-out infinite;z-index:-1;opacity:.5}
@keyframes glow{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.np-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:3px;color:var(--pink);margin-bottom:4px}
.np-song{font-family:'Righteous',cursive;font-size:22px;color:#fff;margin-bottom:1px}
.np-art{font-size:13px;color:var(--blue);font-weight:700}
.np-who{font-size:12px;color:var(--tx2);margin:3px 0 0}
.np-who span{color:var(--yel);font-weight:800}

.ctrl{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.cb{padding:8px 16px;border:1px solid var(--bd);border-radius:9px;background:var(--sf);color:var(--tx);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
.cb:hover{background:var(--sf2);transform:translateY(-1px)}
.cb.pri{background:var(--pink);color:#fff;border-color:var(--pink)}.cb.pri:hover{background:#e0257a}
.cb.grn{background:var(--green);color:#0a0a12;border-color:var(--green)}.cb.grn:hover{background:#30ee10}
.cb.yt{background:#cc0000;color:#fff;border-color:#cc0000}.cb.yt:hover{background:#ff0000}

/* STATUS */
.sbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:9px;margin-bottom:10px;font-size:12px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sdot.on{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.5s infinite}
.sdot.off{background:var(--tx2)}
.stx{flex:1;color:var(--tx2)}.stx b{color:var(--tx)}

.stitle{font-family:'Righteous',cursive;font-size:14px;color:var(--blue);margin-bottom:6px;display:flex;align-items:center;gap:6px}

/* FORM */
.aform{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.aform h3{font-family:'Righteous',cursive;font-size:12px;color:var(--green);margin-bottom:6px}
.arow{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.fi{flex:1;min-width:80px;padding:7px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--bg2);color:var(--tx);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;outline:0}
.fi:focus{border-color:var(--blue)}
.fi::placeholder{color:#665f80;font-weight:400}
select.fi{cursor:pointer;min-width:110px;flex:.4}
.abtn{padding:7px 14px;border:0;border-radius:6px;background:linear-gradient(135deg,var(--green),#20d060);color:#0a0a12;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:.2s;white-space:nowrap}
.abtn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(57,255,20,.3)}
.abtn.sm{padding:5px 10px;font-size:11px}

.ytrow{display:flex;gap:5px;align-items:center;margin-top:5px}
.ytrow a.sr{padding:4px 9px;background:#cc0000;color:#fff;border-radius:5px;text-decoration:none;font-size:10px;font-weight:700;white-space:nowrap}

/* QUEUE */
.ql{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}
.qi{display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:8px;transition:background .15s,border-color .15s,box-shadow .15s,opacity .15s;min-height:38px;position:relative}
.qi:hover{background:var(--sf2);border-color:var(--purp)}
.qi.nxt{border-color:var(--green);background:rgba(57,255,20,.04)}
.qi.dragging{opacity:.4;border-color:var(--blue)}
.qi.drag-over{border-color:var(--blue);box-shadow:0 0 12px rgba(0,212,255,.25);background:rgba(0,212,255,.06)}
.qi-drag{cursor:grab;color:var(--tx2);font-size:14px;padding:0 2px;user-select:none;touch-action:none;display:flex;align-items:center}
.qi-drag:active{cursor:grabbing}
.qi-n{font-family:'Righteous',cursive;font-size:14px;color:var(--purp);min-width:18px;text-align:center}
.qi-i{flex:1;display:flex;align-items:center;gap:4px;overflow:hidden}
.qi-s{font-weight:800;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qi-a{color:var(--tx2);font-size:11px;white-space:nowrap}
.qi-sp{color:var(--bd);font-size:9px}
.qi-p{color:var(--yel);font-size:11px;font-weight:700;white-space:nowrap}
.qi-yt{padding:3px 6px;border-radius:4px;text-decoration:none;font-size:9px;font-weight:700;white-space:nowrap;flex-shrink:0}
.qi-yt.s{background:#cc0000;color:#fff}.qi-yt.l{background:#0a8f00;color:#fff}.qi-yt:hover{opacity:.85}
.qi-x{display:flex;gap:2px;flex-shrink:0}
.qb{width:24px;height:24px;border-radius:4px;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:.15s}
.qb:hover{color:var(--pink);border-color:var(--pink)}
.qb.sk{font-size:8px;width:auto;padding:0 6px}
.qb.sk:hover{color:var(--green);border-color:var(--green)}
.mob-arrow{display:none}

/* DONE BAR */
.done-bar{text-align:center;margin:10px 0;padding:14px;background:var(--sf);border:2px dashed var(--bd);border-radius:10px}
.done-bar p{color:var(--tx2);font-size:11px;margin-bottom:8px}
.done-big{padding:12px 32px;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:.2s}
.done-big.finish{background:var(--green);color:#0a0a12}
.done-big.finish:hover{box-shadow:0 0 16px rgba(57,255,20,.4);transform:translateY(-2px)}
.done-big.skip{background:var(--pink);color:#fff;margin-left:6px}
.done-big.skip:hover{background:#e0257a;transform:translateY(-2px)}

/* SINGERS */
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;margin-bottom:12px}
.sc2{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px;text-align:center;transition:.2s}
.sc2:hover{border-color:var(--purp);transform:translateY(-1px)}
.sav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;margin:0 auto 5px;border:2px solid var(--bd)}
.sn{font-weight:800;font-size:13px;margin-bottom:1px}
.ss{font-size:10px;color:var(--tx2);line-height:1.4}
.ss b{color:var(--yel);font-weight:700}

/* SCORING */
.scb{background:var(--sf);border:1px solid var(--yel);border-radius:10px;padding:16px;text-align:center;margin-bottom:12px;box-shadow:0 0 10px rgba(255,229,59,.06)}
.sc-w{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:2px}
.sc-s{font-family:'Righteous',cursive;font-size:16px;margin-bottom:1px}
.sc-p{color:var(--yel);font-weight:800;font-size:12px}
.sc-cats{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:12px 0}
.sc-c{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:8px;text-align:center}
.sc-cl{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:5px}
.sc-st{display:flex;justify-content:center;gap:3px}
.star{width:28px;height:28px;border-radius:4px;border:1px solid var(--bd);background:var(--sf);color:var(--tx2);font-size:14px;cursor:pointer;transition:.12s;display:flex;align-items:center;justify-content:center}
.star:hover{border-color:var(--gold);color:var(--gold);transform:scale(1.1)}
.star.on{background:var(--gold);color:#1a1a2e;border-color:var(--gold)}
.sub{padding:9px 28px;border:0;border-radius:8px;background:linear-gradient(135deg,var(--yel),var(--orange));color:#0a0a12;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:.2s;margin-top:3px}
.sub:hover{transform:translateY(-1px)}

/* LEADERBOARD */
.lbi{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--sf);border:1px solid var(--bd);border-radius:9px;margin-bottom:4px}
.lbi.r1{border-color:var(--gold);box-shadow:0 0 8px rgba(255,215,0,.1)}.lbi.r2{border-color:#c0c0c0}.lbi.r3{border-color:#cd7f32}
.lb-r{font-family:'Righteous',cursive;font-size:16px;min-width:26px;text-align:center}
.lbi.r1 .lb-r{color:var(--gold)}.lbi.r2 .lb-r{color:#c0c0c0}.lbi.r3 .lb-r{color:#cd7f32}
.lb-i{flex:1}.lb-n{font-weight:800;font-size:12px}.lb-d{font-size:10px;color:var(--tx2)}
.lb-sc{font-family:'Righteous',cursive;font-size:18px;color:var(--yel)}

/* HISTORY */
.hi{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;margin-bottom:2px;font-size:11px}
.hi-n{color:var(--tx2);min-width:16px;font-weight:700}.hi-i{flex:1}.hi-s{font-weight:700}.hi-p{color:var(--yel);font-size:10px}.hi-sc{color:var(--green);font-weight:800}

.empty{padding:30px 16px;text-align:center;color:var(--tx2)}
.empty .ic{font-size:40px;margin-bottom:8px;display:block}
.empty h3{font-family:'Righteous',cursive;font-size:16px;color:var(--tx);margin-bottom:3px}

/* DATABASE */
.db-search{display:flex;gap:5px;margin-bottom:8px}
.db-list{max-height:350px;overflow-y:auto;margin-bottom:10px}
.db-item{display:flex;align-items:center;gap:6px;padding:7px 10px;background:var(--sf);border:1px solid var(--bd);border-radius:7px;margin-bottom:3px;font-size:12px;transition:.15s}
.db-item:hover{background:var(--sf2);border-color:var(--blue)}
.db-song{font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.db-art{color:var(--tx2);font-size:11px;white-space:nowrap;flex-shrink:0}
.db-add{padding:3px 8px;border:1px solid var(--green);border-radius:4px;background:0;color:var(--green);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.db-add:hover{background:var(--green);color:var(--bg)}
.db-rm{padding:3px 6px;border:1px solid var(--bd);border-radius:4px;background:0;color:var(--tx2);font-size:9px;cursor:pointer}
.db-rm:hover{color:var(--pink);border-color:var(--pink)}

/* IMPORT */
.hidden{display:none!important}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes fall{0%{transform:translateY(-100vh) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}.conf{position:fixed;z-index:9999;animation:fall 3s ease-in forwards;pointer-events:none}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);padding:9px 20px;border-radius:8px;background:var(--sf2);border:1px solid var(--green);color:var(--tx);font-weight:700;font-size:12px;z-index:500;transition:transform .35s cubic-bezier(.2,1,.3,1);box-shadow:0 6px 24px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* CONFIRM MODAL */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:24px;max-width:360px;width:100%;text-align:center}
.confirm-box p{font-size:14px;margin-bottom:16px;line-height:1.5}
.confirm-box .song-name{color:var(--yel);font-weight:800}
.confirm-btns{display:flex;gap:8px;justify-content:center}
.confirm-btns button{padding:9px 24px;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s}
.confirm-btns .yes{background:var(--pink);color:#fff}
.confirm-btns .yes:hover{background:#e0257a}
.confirm-btns .no{background:var(--sf);color:var(--tx);border:1px solid var(--bd)}
.confirm-btns .no:hover{background:var(--sf2)}
@media(max-width:600px){
  .hdr h1{font-size:20px}
  .tbtn{padding:5px 9px;font-size:10px}
  .np-song{font-size:17px}
  .sc-cats{grid-template-columns:1fr}
  .arow{flex-wrap:wrap}
  .arow .fi{min-width:calc(50% - 6px)}
  select.fi{min-width:calc(50% - 6px)}
  .db-search{flex-wrap:wrap}
  .qi-drag{display:none}
  .mob-arrow{display:flex!important}
  .qi{padding:10px 8px;gap:5px}
  .qi-s{font-size:12px}
  .qb{width:30px;height:30px;font-size:12px}
  .qb.sk{padding:0 8px}
  .done-big{padding:14px 28px;font-size:15px}
  .cb{padding:10px 16px;font-size:13px}
  .db-item{flex-wrap:wrap;gap:4px}
  .db-url-field{min-width:100%;margin-top:2px}
  .sg{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
  .confirm-box{margin:0 10px}
}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
</style>
</head>
<body>

<div class="hdr">
  <h1>🎤 Shahan's Sing Shack</h1>
  <p>DJ Station &middot; Song Library &middot; Score</p>
</div>

<div class="tabs">
  <button class="tbtn on" onclick="go('stage',this)">🎙️ Stage</button>
  <button class="tbtn" onclick="go('songs',this)">🎵 Songs<span id="badge"></span></button>
  <button class="tbtn" onclick="go('singers',this)">👥 Singers</button>
  <button class="tbtn" onclick="go('scores',this)">⭐ Scores</button>
</div>

<div class="main">
  <!-- STAGE -->
  <div class="tab on" id="tab-stage"><div id="statusBar"></div><div id="stageContent"></div></div>

  <!-- SONGS (Library + Queue combined) -->
  <div class="tab" id="tab-songs">
    <!-- QUEUE SECTION -->
    <div class="stitle">📋 Queue (<span id="qC">0</span>)</div>
    <div class="ql" id="qFull"></div>

    <div style="border-top:1px solid var(--bd);margin:14px 0"></div>

    <!-- LIBRARY SECTION -->
    <div class="stitle">📚 Song Library <span style="font-weight:400;font-size:11px;color:var(--tx2);font-family:Nunito,sans-serif">(<span id="dbCount">0</span> songs)</span></div>

    <div class="db-search">
      <input class="fi" id="dbSearch" placeholder="🔍 Search songs or artists..." oninput="rDb()" style="flex:1">
      <select class="fi" id="dbSinger" style="flex:.35;min-width:100px"><option value="">Singer...</option></select>
    </div>
    <div class="db-list" id="dbList"></div>

    <div style="border-top:1px solid var(--bd);margin:14px 0"></div>

    <!-- ADD NEW SONG -->
    <div class="aform">
      <h3>➕ Add New Song</h3>
      <div class="arow">
        <input class="fi" id="inSong" placeholder="Song name..." autocomplete="off" onkeydown="if(event.key==='Enter')addSong()">
        <input class="fi" id="inArt" placeholder="Artist" autocomplete="off" style="flex:.5" onkeydown="if(event.key==='Enter')addSong()">
        <input class="fi" id="inUrl" placeholder="YouTube URL" autocomplete="off" style="flex:.7;font-size:11px" onkeydown="if(event.key==='Enter')addSong()">
        <select class="fi" id="inSng"><option value="">Singer...</option></select>
        <button class="abtn" onclick="addSong()">🎤 Add & Queue</button>
      </div>
    </div>

    <div style="border-top:1px solid var(--bd);margin:14px 0"></div>

    <!-- HISTORY -->
    <div class="stitle">📜 History</div>
    <div id="hList"></div>
  </div>

  <!-- SINGERS -->
  <div class="tab" id="tab-singers">
    <div class="stitle">👥 Add Singers</div>
    <div class="arow" style="margin-bottom:10px">
      <input class="fi" id="inNm" placeholder="Singer name..." autocomplete="off" onkeydown="if(event.key==='Enter')addP()">
      <button class="abtn" onclick="addP()">➕ Add</button>
    </div>
    <div class="stitle">🎤 Lineup</div>
    <div class="sg" id="sG"></div>
  </div>

  <!-- SCORES -->
  <div class="tab" id="tab-scores">
    <div id="scA"></div>
    <div class="stitle" style="margin-top:14px">🏆 Leaderboard</div>
    <div id="lb"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="confirm-overlay hidden" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMsg"></p>
    <div class="confirm-btns">
      <button class="no" onclick="confirmNo()">Cancel</button>
      <button class="yes" onclick="confirmYes()">Remove</button>
    </div>
  </div>
</div>

<div class="confirm-overlay hidden" id="editOverlay">
  <div class="confirm-box" style="text-align:left">
    <h3 style="font-family:Righteous,cursive;font-size:15px;color:var(--blue);margin-bottom:12px;text-align:center">✏️ Edit Song</h3>
    <div style="display:flex;gap:6px;margin-bottom:10px">
      <div style="flex:1">
        <label style="font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:block;margin-bottom:3px">Song Title</label>
        <input class="fi" id="editSong" style="width:100%">
      </div>
      <div style="flex:1">
        <label style="font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:1px;font-weight:700;display:block;margin-bottom:3px">Artist</label>
        <input class="fi" id="editArt" style="width:100%">
      </div>
    </div>
    <div class="confirm-btns">
      <button class="no" onclick="editCancel()">Cancel</button>
      <button class="yes" onclick="editSave()" style="background:var(--green)">Save</button>
    </div>
  </div>
</div>

<script>
// ========== STATE ==========
let singers=[],queue=[],hist=[],cur=null,lastQid=null;
let scores={},tmp={vocals:0,performance:0,songChoice:0,entertainment:0};
let db=[]; // Song library: {id, song, art, yt}
let ytTabName='_karaoke_yt_'+Date.now(); // unique name for YT tab

const AVS=['🎤','🎵','🎶','🎸','🥁','🎹','🎷','🎺','🪗','🎻','🪘','🎼','🦩','🌟','⭐','🔥','💃','🕺','👑','🦄'];
const BGS=['linear-gradient(135deg,#ff2d95,#ff6b6b)','linear-gradient(135deg,#00d4ff,#0080ff)','linear-gradient(135deg,#b44aff,#8020d0)','linear-gradient(135deg,#39ff14,#20b060)','linear-gradient(135deg,#ffe53b,#ff8800)','linear-gradient(135deg,#ff6b2b,#e04040)','linear-gradient(135deg,#ff2d95,#b44aff)','linear-gradient(135deg,#00d4ff,#39ff14)'];

function addP(){const inp=document.getElementById('inNm'),name=inp.value.trim();if(!name)return;if(singers.find(s=>s.name.toLowerCase()===name.toLowerCase())){toast('Already added!');return}singers.push({id:Date.now(),name,av:AVS[singers.length%AVS.length],bg:BGS[singers.length%BGS.length],done:0});scores[singers[singers.length-1].id]={tot:0,n:0,avg:0};inp.value='';rSng();rSel();toast(name+' joined! 🎉')}
function rmP(id){singers=singers.filter(s=>s.id!==id);delete scores[id];rSng();rSel()}
function rSng(){const g=document.getElementById('sG');if(!singers.length){g.innerHTML='<div class="empty" style="grid-column:1/-1"><span class="ic">👥</span><h3>No Singers</h3><p>Add names above</p></div>';return}g.innerHTML=singers.map(s=>{const sc=scores[s.id];return`<div class="sc2"><div class="sav" style="background:${s.bg}">${s.av}</div><div class="sn">${esc(s.name)}</div><div class="ss">Songs: <b>${s.done}</b> · Avg: <b>${sc.n?sc.avg.toFixed(1):'—'}</b>/5</div><button class="qb" style="margin:5px auto 0;width:auto;padding:2px 7px;font-size:8px" onclick="rmP(${s.id})">✕</button></div>`}).join('')}
function rSel(){const opts='<option value="">Singer...</option>'+singers.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');document.getElementById('inSng').innerHTML=opts;const dbSel=document.getElementById('dbSinger');if(dbSel)dbSel.innerHTML=opts;}

// ========== SONG DATABASE ==========
function initDb(){
  db=STARTER_DB.map((s,i)=>({id:i+1,...s}));
  rDb();
}

function dbRm(id){
  const item=db.find(d=>d.id===id);
  const name=item?item.song:'this song';
  showConfirm(`Remove <span class="song-name">"${esc(name)}"</span> from the library?`,()=>{
    db=db.filter(d=>d.id!==id);rDb();
  });
}

function dbSetLink(id){
  const item=db.find(d=>d.id===id);
  if(!item)return;
  const link=prompt('Paste YouTube link for "'+item.song+'":',item.yt||'');
  if(link===null)return;
  item.yt=link.includes('youtu')?link:'';
  rDb();toast(item.yt?'Link updated! ✅':'Link removed')
}

let editingId=null;
function dbEdit(id){
  const item=db.find(d=>d.id===id);
  if(!item)return;
  editingId=id;
  document.getElementById('editSong').value=item.song;
  document.getElementById('editArt').value=item.art;
  document.getElementById('editOverlay').classList.remove('hidden');
  document.getElementById('editSong').focus();
}
function editSave(){
  const item=db.find(d=>d.id===editingId);
  if(!item)return;
  const s=document.getElementById('editSong').value.trim();
  if(!s){toast('Song title cannot be empty!');return}
  item.song=s;
  item.art=document.getElementById('editArt').value.trim();
  document.getElementById('editOverlay').classList.add('hidden');
  editingId=null;
  rDb();toast('Updated! ✏️')
}
function editCancel(){
  document.getElementById('editOverlay').classList.add('hidden');
  editingId=null;
}

function dbUpdateUrl(id,val){
  const item=db.find(d=>d.id===id);
  if(!item)return;
  item.yt=val.includes('youtu')?val:'';
  // Don't re-render (would lose focus), just update class
  if(item.yt)toast('Link saved! ✅');
}

function syncUrlToDb(song,art,yt){
  if(!yt)return;
  const match=db.find(d=>d.song.toLowerCase()===song.toLowerCase()&&d.art.toLowerCase()===art.toLowerCase());
  if(match&&!match.yt){match.yt=yt;rDb()}
}

function dbToQueue(id){
  const item=db.find(d=>d.id===id);
  if(!item)return;
  const sv=document.getElementById('dbSinger').value;
  if(!sv||!singers.length){toast('Select a singer first!');return}
  const sng=singers.find(s=>s.id===parseInt(sv));
  if(!sng){toast('Select a singer!');return}
  queue.push({id:Date.now(),song:item.song,art:item.art,sid:sng.id,sname:sng.name,ytQ:encodeURIComponent(`${item.song} ${item.art} karaoke`),yt:item.yt||''});
  rQ();rStage();toast(`"${item.song}" queued for ${sng.name}!`)
}

function rDb(){
  const search=document.getElementById('dbSearch')?.value?.toLowerCase()||'';
  const filtered=search?db.filter(d=>d.song.toLowerCase().includes(search)||d.art.toLowerCase().includes(search)):db;
  document.getElementById('dbCount').textContent=db.length;
  const list=document.getElementById('dbList');
  if(!filtered.length){
    list.innerHTML=search?'<p style="color:var(--tx2);font-size:11px;padding:10px">No matches found.</p>':'<p style="color:var(--tx2);font-size:11px;padding:10px">Library is empty. Add songs above.</p>';
    return;
  }
  list.innerHTML=filtered.map(d=>`<div class="db-item"><span class="db-song">${esc(d.song)}</span><span class="db-art">${esc(d.art)}</span><button class="qb" onclick="dbEdit(${d.id})" style="font-size:8px;width:auto;padding:0 5px" title="Edit song/artist">✏️</button><button class="qb" onclick="dbSetLink(${d.id})" style="font-size:8px;width:auto;padding:0 5px" title="${d.yt?'Edit URL':'Add URL'}"><span style="color:${d.yt?'var(--green)':'var(--tx2)'}">🔗</span></button><button class="db-add" onclick="dbToQueue(${d.id})">+ Queue</button><button class="db-rm" onclick="dbRm(${d.id})">✕</button></div>`).join('')
}

// ========== QUEUE ==========
function addSong(){
  const song=document.getElementById('inSong').value.trim();
  const art=document.getElementById('inArt').value.trim();
  const url=document.getElementById('inUrl').value.trim();
  const sv=document.getElementById('inSng').value;
  if(!song){toast('Enter a song!');return}
  if(!sv){toast('Pick a singer!');return}
  const sng=singers.find(s=>s.id===parseInt(sv));
  if(!sng)return;
  const hasUrl=url&&url.includes('youtu');
  const item={id:Date.now(),song,art:art||'',sid:sng.id,sname:sng.name,ytQ:encodeURIComponent(`${song} ${art} karaoke`),yt:hasUrl?url:''};
  queue.push(item);lastQid=item.id;
  // Add to library if not there, or update URL if newly provided
  const existing=db.find(d=>d.song.toLowerCase()===song.toLowerCase()&&d.art.toLowerCase()===(art||'').toLowerCase());
  if(!existing){
    db.push({id:Date.now()+1,song,art:art||'',yt:hasUrl?url:''});
    rDb();
  } else if(hasUrl&&!existing.yt){
    existing.yt=url;
    rDb();
  }
  document.getElementById('inSong').value='';document.getElementById('inArt').value='';document.getElementById('inUrl').value='';
  rQ();rStage();toast(`"${song}" queued for ${sng.name}! 🎶`)
}

function setLk(id){const link=prompt('Paste YouTube link:');if(!link||!link.includes('youtu'))return;const item=queue.find(q=>q.id===id)||(cur&&cur.id===id?cur:null);if(item){item.yt=link;syncUrlToDb(item.song,item.art,link);rQ();rStage();toast('Link saved! ✅')}}

function rmQ(id){

// ========== DRAG & DROP ==========
let dragSrcId=null;
let touchStartY=0;
let touchDragEl=null;
let touchClone=null;

function onDragStart(e,id){
  dragSrcId=id;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',id);
  setTimeout(()=>{
    const el=document.querySelector(`[data-qid="${id}"]`);
    if(el)el.classList.add('dragging');
  },0);
}

function onDragEnd(e){
  document.querySelectorAll('.qi').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over')});
  dragSrcId=null;
}

function onDragOver(e,id){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.qi').forEach(el=>el.classList.remove('drag-over'));
  const el=document.querySelector(`[data-qid="${id}"]`);
  if(el&&id!==dragSrcId)el.classList.add('drag-over');
}

function onDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.qi').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over')});
  if(dragSrcId===null||dragSrcId===targetId)return;
  const fromIdx=queue.findIndex(q=>q.id===dragSrcId);
  const toIdx=queue.findIndex(q=>q.id===targetId);
  if(fromIdx<0||toIdx<0)return;
  const[item]=queue.splice(fromIdx,1);
  queue.splice(toIdx,0,item);
  dragSrcId=null;
  rQ();rStage();
}

// Mobile touch reorder
function onTouchStart(e,id){
  const touch=e.touches[0];
  touchStartY=touch.clientY;
  dragSrcId=id;
  touchDragEl=e.currentTarget;
  touchDragEl.classList.add('dragging');
}

function onTouchMove(e){
  if(!dragSrcId)return;
  e.preventDefault();
  const touch=e.touches[0];
  // Find which queue item we're hovering over
  document.querySelectorAll('.qi[data-qid]').forEach(el=>{
    el.classList.remove('drag-over');
    const rect=el.getBoundingClientRect();
    if(touch.clientY>=rect.top&&touch.clientY<=rect.bottom){
      const hId=parseInt(el.dataset.qid);
      if(hId!==dragSrcId)el.classList.add('drag-over');
    }
  });
}

function onTouchEnd(e){
  if(!dragSrcId)return;
  document.querySelectorAll('.qi').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over')});
  // Find which element has drag-over or is closest to drop point
  const touch=e.changedTouches[0];
  let targetId=null;
  document.querySelectorAll('.qi[data-qid]').forEach(el=>{
    const rect=el.getBoundingClientRect();
    if(touch.clientY>=rect.top&&touch.clientY<=rect.bottom){
      targetId=parseInt(el.dataset.qid);
    }
  });
  if(targetId&&targetId!==dragSrcId){
    const fromIdx=queue.findIndex(q=>q.id===dragSrcId);
    const toIdx=queue.findIndex(q=>q.id===targetId);
    if(fromIdx>=0&&toIdx>=0){
      const[item]=queue.splice(fromIdx,1);
      queue.splice(toIdx,0,item);
      rQ();rStage();
    }
  }
  dragSrcId=null;
  touchDragEl=null;
}

function mvQ(id,d){const i=queue.findIndex(q=>q.id===id);if(i<0)return;const ni=i+d;if(ni<0||ni>=queue.length)return;[queue[i],queue[ni]]=[queue[ni],queue[i]];rQ();rStage()}

function rQ(){
  document.getElementById('badge').textContent=queue.length?` (${queue.length})`:'';
  document.getElementById('qC').textContent=queue.length;
  const c=document.getElementById('qFull');
  if(!queue.length){c.innerHTML='<div style="padding:10px;text-align:center;color:var(--tx2);font-size:12px">No songs queued yet — pick from the library below!</div>'}
  else{c.innerHTML=queue.map((q,i)=>{
    const hl=!!q.yt;
    const srchUrl=`https://www.youtube.com/results?search_query=${q.ytQ}`;
    return`<div class="qi${i===0?' nxt':''}" data-qid="${q.id}" draggable="true" ondragstart="onDragStart(event,${q.id})" ondragend="onDragEnd(event)" ondragover="onDragOver(event,${q.id})" ondrop="onDrop(event,${q.id})" ontouchstart="onTouchStart(event,${q.id})" ontouchmove="onTouchMove(event)" ontouchend="onTouchEnd(event)"><div class="qi-drag" title="Drag to reorder">⠿</div><div class="qi-n">${i+1}</div><div class="qi-i"><span class="qi-s">${esc(q.song)}</span>${q.art?`<span class="qi-sp">·</span><span class="qi-a">${esc(q.art)}</span>`:''}<span class="qi-sp">·</span><span class="qi-p">🎤 ${esc(q.sname)}</span></div>${hl?`<a class="qi-yt l" href="${q.yt}" target="_blank" onclick="event.stopPropagation()">▶</a>`:`<a class="qi-yt s" href="${srchUrl}" target="_blank" onclick="event.stopPropagation()">🔍</a><button class="qb" onclick="setLk(${q.id})" style="font-size:8px;width:auto;padding:0 5px;color:var(--orange);border-color:var(--orange)" title="Add YouTube link">🔗</button>`}<div class="qi-x"><button class="qb mob-arrow" onclick="mvQ(${q.id},-1)">↑</button><button class="qb mob-arrow" onclick="mvQ(${q.id},1)">↓</button><button class="qb sk" onclick="skipTo(${q.id})">⏭</button><button class="qb" onclick="rmQ(${q.id})">✕</button></div></div>`
  }).join('')}
  const h=document.getElementById('hList');
  if(!hist.length){h.innerHTML='<p style="color:var(--tx2);font-size:10px">No songs yet.</p>'}
  else{h.innerHTML=hist.map((x,i)=>`<div class="hi"><div class="hi-n">${i+1}</div><div class="hi-i"><span class="hi-s">${esc(x.song)}${x.art?' · '+esc(x.art):''}</span><br><span class="hi-p">🎤 ${esc(x.sname)}</span></div><div class="hi-sc">${x.score?x.score.toFixed(1)+'★':''}</div></div>`).join('')}
}

// ========== STAGE ==========
function openCurYT(){
  if(cur&&cur.yt)openYT(cur.yt);
  else if(cur)openYT('https://www.youtube.com/results?search_query='+cur.ytQ);
}

function rStage(){
  rStatus();
  const el=document.getElementById('stageContent');
  if(!cur&&!queue.length){el.innerHTML='<div class="empty"><span class="ic">🎙️</span><h3>Stage is Empty</h3><p>Add singers & queue songs to start!</p></div>';return}
  if(!cur&&queue.length){
    const next=queue[0];
    el.innerHTML=`<div style="text-align:center;padding:24px;background:var(--sf);border:1px solid var(--bd);border-radius:12px"><span style="font-size:48px;display:block;margin-bottom:8px">🎙️</span><div style="color:var(--tx2);font-size:13px;margin-bottom:12px"><b>${queue.length} song${queue.length>1?'s':''}</b> ready!<br>First up: <b>${esc(next.song)}</b> by <b>${esc(next.sname)}</b></div><button class="done-big finish" onclick="playNext()">🎤 Start Karaoke Night!</button></div>`;
    return;
  }
  const hasYT=!!cur.yt;
  let upNextHTML='';
  if(queue.length){
    upNextHTML=`<div class="stitle" style="margin-top:12px">⏭️ Up Next</div><div class="ql">${queue.slice(0,5).map((q,i)=>`<div class="qi${i===0?' nxt':''}"><div class="qi-n" style="color:${i===0?'var(--green)':'var(--purp)'}">${i===0?'→':i+1}</div><div class="qi-i"><span class="qi-s">${esc(q.song)}</span>${q.art?`<span class="qi-sp">·</span><span class="qi-a">${esc(q.art)}</span>`:''}<span class="qi-sp">·</span><span class="qi-p">🎤 ${esc(q.sname)}</span></div>${i>0?`<button class="qb sk" onclick="skipTo(${q.id})">⏭</button>`:''}</div>`).join('')}${queue.length>5?`<p style="text-align:center;color:var(--tx2);font-size:10px;padding:3px">+${queue.length-5} more</p>`:''}</div>`;
  }
  el.innerHTML=`
    <div class="np"><div class="np-lbl pulse">♫ Now Playing ♫</div><div class="np-song">${esc(cur.song)}</div><div class="np-art">${esc(cur.art)}</div><div class="np-who">Performed by <span>${esc(cur.sname)}</span></div></div>
    <div class="ctrl">
      <button class="cb yt" onclick="openCurYT()">▶ Play on YouTube</button>
      ${!hasYT?`<button class="cb" onclick="setLk(${cur.id})">🔗 Add Link</button>`:''}
      <button class="cb" onclick="go('scores',document.querySelectorAll('.tbtn')[3])">⭐ Score</button>
    </div>
    <div class="done-bar"><p>When the song ends:</p><button class="done-big finish" onclick="nextSong()">✅ Done — Next!</button></div>
    ${upNextHTML}`;
}

function rStatus(){
  const sb=document.getElementById('statusBar');
  if(cur){sb.innerHTML=`<div class="sbar"><div class="sdot on"></div><div class="stx"><b>${esc(cur.song)}</b> · ${esc(cur.sname)}</div><span style="font-size:10px;color:var(--tx2)">${queue.length} in queue</span></div>`}
  else if(queue.length){sb.innerHTML=`<div class="sbar"><div class="sdot off"></div><div class="stx"><b>${queue.length}</b> song${queue.length>1?'s':''} ready</div></div>`}
  else{sb.innerHTML=''}
}

function archive(){
  if(!cur)return;
  const sc=tmp;const avg=(sc.vocals+sc.performance+sc.songChoice+sc.entertainment)/4;
  hist.push({...cur,score:avg>0?avg:null});
  const singer=singers.find(s=>s.id===cur.sid);
  if(singer){singer.done++;if(avg>0){scores[singer.id].tot+=avg;scores[singer.id].n++;scores[singer.id].avg=scores[singer.id].tot/scores[singer.id].n}}
  tmp={vocals:0,performance:0,songChoice:0,entertainment:0};
  cur=null;
}

function playNext(){
  if(!queue.length){cur=null;rAll();return}
  cur=queue.shift();
  rAll();
  // Auto-open YouTube for the new song
  if(cur.yt) openYT(cur.yt);
  else openYT('https://www.youtube.com/results?search_query='+cur.ytQ);
  toast(`🎤 ${cur.sname} — "${cur.song}"!`)
}

function nextSong(){
  if(cur)archive();
  playNext();
  // Auto-open YouTube for the new song (this is a direct user click so window.open works)
  if(cur){openCurYT();}
  if(!cur&&!queue.length){toast('🎉 That\'s a wrap!');if(hist.length>=3)confetti()}
}

function rAll(){rStage();rQ();rSng();rLb();rSc()}

// ========== SCORING ==========
function rSc(){
  const a=document.getElementById('scA');
  if(!cur){a.innerHTML='<div class="empty" style="padding:16px"><span class="ic">⭐</span><h3>No Active Song</h3><p>Start from Stage</p></div>';return}
  const cats=[{k:'vocals',l:'🎤 Vocals'},{k:'performance',l:'💃 Presence'},{k:'songChoice',l:'🎵 Song'},{k:'entertainment',l:'🔥 Fun'}];
  a.innerHTML=`<div class="scb"><div class="sc-w">Now Judging</div><div class="sc-s">${esc(cur.song)}</div><div class="sc-p">🎤 ${esc(cur.sname)}</div><div class="sc-cats">${cats.map(c=>`<div class="sc-c"><div class="sc-cl">${c.l}</div><div class="sc-st">${[1,2,3,4,5].map(n=>`<button class="star ${tmp[c.k]>=n?'on':''}" onclick="ssc('${c.k}',${n})">★</button>`).join('')}</div></div>`).join('')}</div><button class="sub" onclick="subSc()">✨ Submit & Next</button></div>`
}
function ssc(c,v){tmp[c]=v;rSc()}
function subSc(){const avg=(tmp.vocals+tmp.performance+tmp.songChoice+tmp.entertainment)/4;if(avg===0){toast('Rate at least one!');return}toast(`Score: ${avg.toFixed(1)}/5 ⭐`);if(avg>=4.5)confetti();nextSong()}
function rLb(){const lb=document.getElementById('lb');const r=singers.filter(s=>scores[s.id].n>0).map(s=>({...s,...scores[s.id]})).sort((a,b)=>b.avg-a.avg);if(!r.length){lb.innerHTML='<p style="color:var(--tx2);font-size:10px">Score songs to see rankings!</p>';return}lb.innerHTML=r.map((s,i)=>`<div class="lbi ${i<3?'r'+(i+1):''}"><div class="lb-r">${i===0?'👑':'#'+(i+1)}</div><div class="sav" style="background:${s.bg};width:28px;height:28px;font-size:12px;flex-shrink:0">${s.av}</div><div class="lb-i"><div class="lb-n">${esc(s.name)}</div><div class="lb-d">${s.n} song${s.n>1?'s':''}</div></div><div class="lb-sc">${s.avg.toFixed(1)}★</div></div>`).join('')}

function confetti(){const cols=['#ff2d95','#00d4ff','#b44aff','#39ff14','#ffe53b','#ff6b2b','#ffd700'];for(let i=0;i<50;i++){const p=document.createElement('div');p.className='conf';p.style.left=Math.random()*100+'vw';p.style.background=cols[~~(Math.random()*cols.length)];p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';p.style.animationDuration=(2+Math.random()*2)+'s';p.style.animationDelay=Math.random()*.5+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),4000)}}

// INIT
initDb();rAll();
</script>
</body>
</html>
